anytown.weather_page:
  path: '/weather'
  defaults:
    _controller: '\Drupal\anytown\Controller\WeatherController::content'
    _title: 'Anytown Weather'
  requirements:
    _permission: 'view weather'

anytown.weather_details:
  path: '/weather/{city}'
  defaults:
    _controller: '\Drupal\anytown\Controller\WeatherController::details'
    _title: 'Weather Details'
  requirements:
    _permission: 'view weather'

anytown.settings:
  path: '/admin/config/services/anytown'
  defaults:
    _form: '\Drupal\anytown\Form\SettingsForm'
    _title: 'Anytown Settings'
  requirements:
    _permission: 'administer site configuration '

anytown.attending:
  path: '/attending'
  defaults:
    _title: 'Attending'
    _controller: '\Drupal\anytown\Controller\Attending::build'
  requirements:
    _permission: 'access content'

anytown.node_selector:
  path: '/anytown/node-selector'
  defaults:
    _form: '\Drupal\anytown\Form\NodeSelectorForm'
    _title: 'Select a Node'
  requirements:
    _permission: 'access content'
